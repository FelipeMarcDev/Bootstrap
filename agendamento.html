<div class="container mt-5">
    <h2 class="text-center mb-4"><i class="bi bi-calendar-event me-2"></i>Novo Agendamento</h2>
    
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow p-4">
                <form>
                    <div class="mb-3">
                        <label class="form-label">Selecionar Paciente</label>
                        <select class="form-select">
                            <option>João Silva</option>
                            <option>Maria Souza</option>
                        </select>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Data</label>
                            <input type="date" class="form-control">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Horário</label>
                            <input type="time" class="form-control">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Dentista Responsável</label>
                        <select class="form-select">
                            <option>Dra. Ana (Clínico Geral)</option>
                            <option>Dr. Paulo (Ortodontista)</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100 py-2 mt-3">Confirmar Agendamento</button>
                </form>
            </div>
        </div>
    </div>
</div>
