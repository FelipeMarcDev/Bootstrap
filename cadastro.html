<!doctype html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OdontoCare | Cadastro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css" />
</head>


<body>
  <!-- NAVBAR -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm sticky-top">
    <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="bi bi-heart-pulse-fill me-2"></i>OdontoCare</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link active" href="cadastro.html">Cadastro</a></li>
                <li class="nav-item"><a class="nav-link" href="dashboard.html">Dashboard</a></li>
                <li class="nav-item"><a class="nav-link" href="pacientes.html">Pacientes</a></li>
            </ul>
        </div>
    </div>
</nav>
  <!-- FORMULARIO -->


  <div class="container mt-5">
    <h2 class="text-center mb-4">Cadastro de Pacientes</h2>


    <div class="card shadow p-4">
      <form>
        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Nome completo</label>
            <input type="text" class="form-control" placeholder="Digite o nome" />
          </div>


          <div class="col-md-6 mb-3">
            <label class="form-label">CPF</label>
            <input type="text" class="form-control" placeholder="000.000.000-00" />
          </div>
        </div>


        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Telefone</label>
            <input type="text" class="form-control" placeholder="(11) 99999-9999" />
          </div>


          <div class="col-md-6 mb-3">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" placeholder="email@email.com" />
          </div>
        </div>


        <div class="row">
          <div class="col-md-6 mb-3">
            <label class="form-label">Data de nascimento</label>
            <input type="date" class="form-control" />
          </div>


          <div class="col-md-6 mb-3">
            <label class="form-label">Plano odontológico</label>


            <select class="form-select">
              <option selected>Selecione</option>
              <option>Unimed</option>
              <option>Amil</option>
              <option>Bradesco Saúde</option>
              <option>Particular</option>
            </select>
          </div>
        </div>


        <div class="mb-3">
          <label class="form-label">Observações</label>


          <textarea class="form-control" rows="3"></textarea>
        </div>


        <div class="text-center">
          <button class="btn btn-primary btn-lg">Cadastrar Paciente</button>
        </div>
      </form>
    </div>
  </div>


  <footer class="bg-dark text-white text-center p-3 mt-5">
    © 2026 OdontoCare
  </footer>


  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
